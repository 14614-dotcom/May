<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ AMONRAT Y2K WORLD ⚡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace, sans-serif; }
        
        /* พื้นหลังลายตาราง Y2K ชมพูสดใส ไล่เฉดฟ้าพาสเทลตามรูป */
        body { 
            background: linear-gradient(180deg, #ffb6c1 0%, #ffc6ff 40%, #cbf3f0 100%);
            background-image: linear-gradient(rgba(255, 255, 255, 0.3) 2px, transparent 2px), linear-gradient(90deg, rgba(255, 255, 255, 0.3) 2px, transparent 2px);
            background-size: 25px 25px;
            color: #0c1a60;
            min-height: 100vh;
            padding-bottom: 60px;
        }
        
        /* เมนูสไตล์แถบเครื่องเกมพิกเซล */
        nav { background: #0c1a60; padding: 12px; text-align: center; border-bottom: 4px solid #ff4081; box-shadow: 0 4px 0 #000; }
        nav a { text-decoration: none; color: #fff; font-weight: bold; font-size: 13px; padding: 8px 16px; margin: 3px; border: 2px solid #ff4081; background: #ff79b0; box-shadow: 2px 2px 0px #000; display: inline-block; transition: 0.1s; }
        nav a:hover, nav a.active { background: #00e5ff; color: #0c1a60; border-color: #0c1a60; box-shadow: 0px 0px 8px #00e5ff; transform: translateY(-2px); }

        /* กล่องหน้าต่างคอมพิวเตอร์ Y2K Game Console */
        .window { max-width: 600px; margin: 40px auto; background: #ffffff; border: 4px solid #0c1a60; box-shadow: 8px 8px 0px #0c1a60; border-radius: 12px; overflow: hidden; }
        .window-header { background: linear-gradient(90deg, #ff4081, #ff79b0); padding: 10px 15px; color: #fff; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0c1a60; }
        .window-buttons span { display: inline-block; width: 16px; height: 16px; background: #fff; border: 2px solid #0c1a60; margin-left: 5px; text-align: center; line-height: 10px; font-size: 11px; color: #0c1a60; cursor: pointer; font-weight: bold; border-radius: 3px; }
        
        .content { padding: 30px; text-align: center; position: relative; }
        
        /* สัญลักษณ์ตกแต่งวิบวับและหัวใจรอบๆ เว็บ */
        .deco-star { color: #00e5ff; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #0c1a60; }
        .deco-heart { color: #ff4081; font-size: 30px; animation: heartbeat 1.2s infinite; display: inline-block; }
        
        h1 { font-size: 26px; color: #0c1a60; margin: 15px 0; letter-spacing: 1px; font-weight: 900; text-shadow: 3px 3px 0px #ffc6ff; line-height: 1.4; }
        
        /* กรอบรูปหัวใจ หรือ กรอบย้อนยุค */
        .photo-container { width: 220px; height: 220px; margin: 20px auto; border: 4px dashed #ff4081; padding: 10px; background: #fff; border-radius: 20px; box-shadow: 4px 4px 0 #0c1a60; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 2px solid #0c1a60; }
        
        /* ปุ่ม Press Start แบบในรูปตัวอย่าง */
        .start-btn { display: inline-block; background: #00e5ff; color: #0c1a60; font-weight: bold; font-size: 18px; padding: 12px 35px; border: 3px solid #0c1a60; box-shadow: 4px 4px 0px #0c1a60; text-decoration: none; margin-top: 15px; border-radius: 8px; transition: 0.1s; }
        .start-btn:hover { background: #ff4081; color: #fff; transform: translate(2px, 2px); box-shadow: 2px 2px 0px #0c1a60; }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="active">HOME</a>
        <a href="profile.html">PROFILE</a>
        <a href="education.html">EDUCATION</a>
        <a href="portfolio.html">WORKS</a>
        <a href="award.html">AWARDS</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <div class="window">
        <div class="window-header">
            <span>🕹️ AMONRAT_GAME_CONSOLE.sys</span>
            <div class="window-buttons"><span>_</span><span>◽</span><span>X</span></div>
        </div>
        <div class="content">
            <div><span class="deco-star">✦</span> <span class="deco-heart">♥</span> <span class="deco-star">✦</span></div>
            
            <h1>ยินดีต้อนรับสู่ portfolio ของ อมรรัตน์</h1>
            
            <div class="photo-container">
                <img src="me.jpg" alt="Amonrat" class="profile-img" onerror="this.src='https://placehold.co/200/ff4081/ffffff?text=AMONRAT'">
            </div>
            
            <p style="font-weight: bold; margin: 15px 0; color: #ff4081;">[ INSERT COIN TO START THE GAME ]</p>
            
            <a href="profile.html" class="start-btn">Press Start !</a>
        </div>
    </div>

</body>
</html>
