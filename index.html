<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | อมรรัตน์</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
scroll-behavior:smooth;
}

body{

background:linear-gradient(135deg,#ffffff,#eef8ff,#d9eeff);

overflow-x:hidden;

}

/* ===== Navbar ===== */

nav{

position:fixed;

top:0;

left:0;

width:100%;

padding:18px 8%;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.85);

backdrop-filter:blur(12px);

box-shadow:0 5px 20px rgba(0,0,0,.08);

z-index:999;

}

.logo{

font-size:30px;

font-weight:bold;

color:#2f80ed;

}

nav ul{

display:flex;

list-style:none;

gap:18px;

}

nav ul li a{

text-decoration:none;

padding:12px 22px;

border-radius:50px;

font-size:17px;

font-weight:bold;

color:#2f80ed;

transition:.35s;

}

nav ul li a:hover{

background:#5eb4ff;

color:white;

transform:translateY(-4px);

box-shadow:0 10px 20px rgba(94,180,255,.35);

}

nav ul li a:active{

transform:scale(.9);

}

/* ===== Hero ===== */

.hero{

padding-top:150px;

text-align:center;

padding-bottom:80px;

}

.hero img{

width:240px;

height:240px;

object-fit:cover;

border-radius:50%;

border:8px solid white;

box-shadow:0 0 30px #8ecfff;

}

.hero h1{

margin-top:25px;

font-size:48px;

color:#2f80ed;

}

.hero p{

margin-top:18px;

font-size:20px;

color:#666;

line-height:1.8;

}

.button{

display:inline-block;

margin-top:35px;

padding:15px 40px;

background:#4ea7ff;

color:white;

text-decoration:none;

border-radius:50px;

font-size:18px;

transition:.3s;

}

.button:hover{

background:#2377ff;

transform:translateY(-5px);

}

/* ===== Card ===== */

.container{

width:90%;

max-width:1100px;

margin:auto;

}

.card{

background:white;

margin-top:40px;

padding:40px;

border-radius:25px;

box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.card h2{

color:#2f80ed;

margin-bottom:20px;

font-size:32px;

}

.card p{

font-size:18px;

line-height:2;

color:#555;

}

footer{

margin-top:80px;

padding:25px;

text-align:center;

background:#dbefff;

color:#444;

}

@media(max-width:768px){

nav{

flex-direction:column;

gap:15px;

}

nav ul{

flex-wrap:wrap;

justify-content:center;

}

.hero h1{

font-size:34px;

}

.hero img{

width:180px;

height:180px;

}

}

</style>

</head>
<body>

<!-- ===== เมนูด้านบน ===== -->

<nav>

<div class="logo">💙 Portfolio</div>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="profile.html">Profile</a></li>

<li><a href="education.html">Education</a></li>

<li><a href="award.html">Award</a></li>

<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

<!-- ===== หน้าแรก ===== -->

<section class="hero">

<img src="images/me.jpg" alt="Profile">

<h1>ยินดีต้อนรับสู่<br>Portfolio ของ อมรรัตน์</h1>

<p>

เว็บไซต์สำหรับนำเสนอประวัติส่วนตัว<br>

ประวัติการศึกษา ผลงาน และช่องทางการติดต่อ

</p>

<a href="profile.html" class="button">

เริ่มต้น

</a>

</body>
</html>
