<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio - หน้าแรก</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: #0d0f1a;
            color: #00f3ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        /* พื้นหลัง AI ขยับได้ */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,243,255,0.1) 10%, transparent 20%),
                        linear-gradient(0deg, transparent 24%, rgba(0, 243, 255, .05) 25%, rgba(0, 243, 255, .05) 26%, transparent 27%);
            background-size: 50px 50px;
            animation: moveBg 10s linear infinite;
            z-index: 1;
        }
        @keyframes moveBg {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }
        nav { position: absolute; top: 20px; z-index: 2; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; transition: 0.3s; }
        nav a:hover { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; }
        .hero { text-align: center; z-index: 2; border: 1px solid #00f3ff; padding: 40px; border-radius: 15px; background: rgba(13, 15, 26, 0.8); box-shadow: 0 0 20px #00f3ff; }
        h1 { font-size: 3rem; text-shadow: 0 0 15px #00f3ff; margin-bottom: 10px; }
        p { color: #fff; font-size: 1.2rem; }
    </style>
</head>
<body>
    <nav>

        <a href="projects.html">ผลงาน</a>
        <a href="contact.html">ช่องทางการติดต่อ</a>
    </nav>

    <div class="hero">
        <h1>PORTFOLIO</h1>
        <p>แฟ้มสะสมผลงานด้านเทคโนโลยีสารสนเทศ & AI</p>
    </div>
</body>
</html>
