<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าหลัก | Portfolio Amornrut</title>
    <style>
        /* ==========================================================================
           1. DESIGN SYSTEM & RESET (สไตล์หลักสำหรับทุกหน้า)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7fc;
            color: #1a2a3a;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Animation (พื้นหลังอนิเมชั่นขยับได้) */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #eef3fb 100%);
            overflow: hidden;
        }

        /* สร้างลูกเล่นเส้นสายและโหนด AI ขยับได้ */
        .bg-animation::before, .bg-animation::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 85, 255, 0.08) 0%, rgba(0, 191, 255, 0) 70%);
            animation: floatNodes 15s infinite alternate ease-in-out;
        }
        .bg-animation::after {
            width: 450px;
            height: 450px;
            left: auto;
            right: -50px;
            top: 40%;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.06) 0%, rgba(0, 85, 255, 0) 70%);
            animation-duration: 20s;
        }

        @keyframes floatNodes {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            100% { transform: translateY(-50px) scale(1.1) rotate(45deg); }
        }

        /* เส้นตาราง Cyber Grid แบบบางเบา */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 85, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 85, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.8;
        }

        /* ==========================================================================
           2. NAVIGATION BAR (แถบเมนูด้านบน)
           ========================================================================== */
        nav {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(0, 85, 255, 0.15);
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 85, 255, 0.03);
        }

        /* โลโก้ผสมอักษรจีนดิจิทัล */
        .logo {
            font-size: 22px;
            font-weight: 800;
            color: #0055ff;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .logo span {
            color: #00bfff;
            font-weight: 400;
        }
        .logo::before {
            content: "☯";
            font-size: 20px;
            color: #0055ff;
            animation: spin 8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        nav ul {
            display: flex;
            list-style: none;
            gap: 10px;
        }

        nav ul li a {
            text-decoration: none;
            color: #486581;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid transparent;
        }

        nav ul li a:hover, nav ul li a.active {
            color: #0055ff;
            background: rgba(0, 85, 255, 0.06);
            border: 1px solid rgba(0, 85, 255, 0.15);
        }

        /* ==========================================================================
           3. HERO CONTENT SECTION (ส่วนเนื้อหาหน้าหลัก)
           ========================================================================== */
        .container {
            max-width: 1200px;
            margin: 15vh auto 5vh;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        /* Glassmorphism Card (กรอบกระจกฝ้า) */
        .hero-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            max-width: 850px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px rgba(0, 85, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* กรอบมุมสไตล์เมฆจีนโบราณแบบมินิมอลโมเดิร์น */
        .hero-card::before {
            content: "｢ 华 ｣";
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 14px;
            color: rgba(0, 85, 255, 0.3);
            letter-spacing: 2px;
        }
        .hero-card::after {
            content: "⚡ AI.SYS";
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 12px;
            color: rgba(0, 191, 255, 0.4);
            font-family: monospace;
        }

        /* หัวข้อเทคโนโลยี */
        .hero-card h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #0055ff 30%, #00bfff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        /* เส้นประดับแผงวงจรผสมลวดลายจีน (Circuit Line Decor) */
        .decor-line {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #0055ff, #00bfff, transparent);
            margin: 0 auto 25px;
            position: relative;
        }
        .decor-line::before {
            content: "祥云";
            font-size: 10px;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            color: #00bfff;
            opacity: 0.5;
            letter-spacing: 3px;
        }

        .hero-card p {
            font-size: 18px;
            line-height: 1.8;
            color: #486581;
            max-width: 650px;
            margin: 0 auto 40px;
        }

        /* ปุ่มกด Action */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 35px;
            background: linear-gradient(135deg, #0055ff, #00bfff);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 85, 255, 0.25);
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 85, 255, 0.4);
            filter: brightness(1.05);
        }
        
        .cta-btn span {
            font-size: 18px;
            transition: 0.3s;
        }
        .cta-btn:hover span {
            transform: translateX(4px);
        }
    </style>
</head>
<body>

    <!-- ส่วนพื้นหลังอนิเมชั่น -->
    <div class="bg-animation"></div>
    <div class="cyber-grid"></div>

    <!-- แถบเมนูด้านบน (Persistent Navbar) -->
    <nav>
        <div class="logo">CYBER<span>华 (Huá)</span></div>
        <ul>
            <li><a href="index.html" class="active">หน้าหลัก</a></li>
            <li><a href="about.html">ประวัติส่วนตัว</a></li>
            <li><a href="education.html">ประวัติการศึกษา</a></li>
            <li><a href="projects.html">ผลงาน</a></li>
            <li><a href="contact.html">ช่องทางการติดต่อ</a></li>
        </ul>
    </nav>

    <!-- ส่วนเนื้อหาหลัก -->
    <div class="container">
        <div class="hero-card">
            <h1>ยินดีต้อนรับสู่ profile<br>นางสาว อมรรัตน์ ศรีโม่ง</h1>
            
            <div class="decor-line"></div>
            
          
            
            <a href="profile.html" class="cta-btn">
                เริ่มต้นทำความรู้จัก <span>➔</span>
            </a>
        </div>
    </div>

</body>
</html>
